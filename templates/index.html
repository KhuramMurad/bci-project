<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCI Neural Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-mesh">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="dashboard-container">
        <header class="glass-panel dashboard-header">
            <div class="logo-area">
                <div class="pulse-ring"></div>
                <h1>Neural<span class="highlight">Sync</span></h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot connected" id="connection-status-dot"></span>
                <span id="connection-status-text">Connecting...</span>
            </div>
        </header>

        <section class="metrics-grid">
            <div class="glass-panel metric-card">
                <h3>Focus Level</h3>
                <div class="metric-value">
                    <span id="focus-val">0</span><span class="unit">%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="focus-bar"></div></div>
            </div>
            <div class="glass-panel metric-card">
                <h3>Relaxation</h3>
                <div class="metric-value">
                    <span id="relax-val">0</span><span class="unit">%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="relax-bar"></div></div>
            </div>
            <div class="glass-panel metric-card">
                <h3>Signal Quality</h3>
                <div class="metric-value">
                    <span id="quality-val">Excellent</span>
                </div>
                <div class="signal-bars">
                    <div class="bar active"></div>
                    <div class="bar active"></div>
                    <div class="bar active"></div>
                    <div class="bar active"></div>
                </div>
            </div>
        </section>

        <section class="glass-panel chart-container">
            <div class="chart-header">
                <h2>Real-Time EEG Streams</h2>
                <div class="channel-toggles">
                    <!-- Toggles will be generated by JS -->
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="eegChart"></canvas>
            </div>
        </section>
    </main>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
